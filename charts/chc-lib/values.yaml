---
exports:
  # -- Default values to import when using this chart as a dependency in an application chart.
  defaults:
    # -- Used to override the base name for all resources.
    nameOverride: ""

    # -- Used to override the full name for all resources.
    fullnameOverride: ""

    # -- Labels to add to all resources. Values go through tpl.
    commonLabels: {}

    # -- Annotations to add to all resources. Values go through tpl.
    commonAnnotations: {}

    # -- Default imageRegistry to use when no other registry is specified.
    imageRegistry: ""

    pod:
      # -- Toggle to enable/disable the creation of the pod.
      create: true

      # -- Name of the pod to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to a pod in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to a pod in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- (int) Duration in seconds a pod may be active on the node before the system will mark it as failed to kill its containers.
      # Omitted, if nil or empty.
      activeDeadlineSeconds: ~

      affinity:
        # -- Describes node affinity scheduling rules for a pod. Can be a preset name (string) or a dict.
        # See [Affinities](#affinities) in README for more.
        nodeAffinity: {}

        # -- Describes pod affinity scheduling rules for a pod. Can be a preset name (string) or a dict.
        # See [Affinities](#affinities) in README for more.
        podAffinity: {}

        # -- Describes pod anti-affinity scheduling rules for a pod. Can be a preset name (string) or a dict.
        # See [Affinities](#affinities) in README for more.
        podAntiAffinity: {}

      serviceAccount:
        # -- Name of the serviceAccount to use for a pod. Will be computed, if nil or empty.
        name: ""

        # -- Toggle to enable/disable the automatic mount of the serviceAccount token. Omitted, if not true.
        automountToken: false

      # -- Containers that are part of a pod. See [Containers](#containers) in README for more.
      containers: {}

      # -- DNS policy to use. Should probably be set to "ClusterFirstWithHostNet", if "hostNetwork=true".
      # Omitted, if nil or empty.
      dnsPolicy: ~

      # -- List of hosts and IPs that will be injected into a pods hosts file.
      # Omitted, if nil or empty.
      hostAliases: []

      # -- Toggle to start a pod in hostNetwork mode. Omitted, if not true.
      hostNetwork: false

      # --  List of references to secrets in the same namespace to use for pulling any of the images that are part of a pod.
      # Omitted, if nil or empty.
      imagePullSecrets: []

      # -- Init containers that are part of a pod. See [InitContainers](#initcontainers) in README for more.
      initContainers: {}

      # -- Name of a node to schedule a pod to. Mainly useful for debugging purposes.
      # Omitted, if nil or empty.
      nodeName: ""

      # -- Node selector for pod scheduling. Simpler to use than "affinity.nodeAffinity", but limited to simple label selectors.
      # Omitted, if nil or empty.
      nodeSelector: {}

      # -- Name of a priorityClass to use for a pod. Omitted if nil or empty.
      priorityClassName: ""

      # -- Restart policy for all containers within the pod. One of "Always", "OnFailure", "Never".
      # Omitted, if nil or empty.
      restartPolicy: Always

      # -- Security context to use for a pod. Can be a preset name (string) or a dict.
      # See [PodSecurityContext](#podsecuritycontext) in README for more.
      securityContext: default

      # -- Seconds to wait for graceful termination of a pod, when a SIGTERM/SIGKILL is send.
      # Omitted, if nil or empty.
      terminationGracePeriodSeconds: ~

      # -- Tolerations for pod scheduling. Omitted, if nil or empty.
      tolerations: []

      # -- Volumes to mount into a pod. Follows the "List from dict" input schema.
      # See [List from dict](#list-from-dict) in README for more.
      # Omitted, if nil or empty.
      volumes: {}

    job:
      # -- Toggle to enable/disable the creation of the job.
      create: true

      # -- Name of the job to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to a job in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to a job in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- Toggle to enable/disable the automatic creation of a unique resource name by the kubernetes API server.
      # Omitted, if not true.
      generateName: false

      # -- Specifies the duration in seconds that the job may be active before the system tries to terminate it.
      # Omitted, if nil or empty.
      activeDeadlineSeconds: 3600

      # -- The number of retries before marking this job failed. Omitted, if nil or empty.
      backoffLimit: 3
      
      # -- (int) The limit for the number of retries within an index before marking this index as failed.
      # Only takes effect if "completionMode=Indexed". Omitted, if nil or empty.
      backoffLimitPerIndex: ~

      # -- (int) Specifies the maximal number of failed indexes before marking the job as failed, when backoffLimitPerIndex is set.
      # Omitted, if nil or empty.
      maxFailedIndexes: ~

      # -- Specifies how pod completions are tracked. Can be set to "NonIndexed" or "Indexed".
      # Omitted, if nil or empty.
      completionMode: ~

      # -- The desired number of successfully finished pods the job should be run with.
      # Omitted, if empty.
      completions: 1

      # -- The maximum desired number of pods the job should run at any given time.
      # Omitted, if nil or empty.
      parallelism: 1

      # -- Specifies the policy of handling failed pods. Omitted, if nil or empty.
      podFailurePolicy: ~

      # -- Specifies when to create new pods that replace old ones. Omitted, if nil or empty.
      podReplacementPolicy: ~

      # -- Specifies the policy when the job can be declared as succeeded. Omitted, if nil or empty.
      successPolicy: ~

      # -- Specifies whether the job should create new pods, or not. Omitted, if not true.
      suspend: false

      # -- Time in seconds after which a finished pod is cleaned up automatically. If unset, pods are never cleaned up.
      # Omitted, if nil or empty.
      ttlSecondsAfterFinished: 3600

      # -- Values to configure the pods managed by the job.
      # You can use all fields described in the [Pod](#pod) section of the README here.
      pods: {}

    deployment:
      # -- Toggle to enable/disable the creation of the deployment.
      create: true

      # -- Name of the deployment to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the deployment in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the deployment in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- (int) Number of seconds to wait before a pod is considered available, if no containers are crashing.
      # Omitted, if nil or empty.
      minReadySeconds: ~

      # -- Indicates that the deployment is paused. Omitted, if not true.
      paused: false

      # -- (int) The maximum time in seconds for a deployment to make progress before it is considered to be failed.
      # Omitted, if nil or empty.
      progressDeadlineSeconds: ~

      # -- (int) Number of desired pods to create. Omitted, if nil or empty.
      replicas: ~

      # -- (int) Number of old ReplicaSets to retain to allow rollback. Omitted, if nil or empty.
      revisionHistoryLimit: ~

      # -- The deployment strategy to use to replace existing pods with new ones. Omitted, if nil or empty.
      strategy: {}

      # -- Values to configure the pods managed by the deployment.
      # You can use all fields described in the [Pod](#pod) section of the README here.
      pods: {}

    statefulSet:
      # -- Toggle to enable/disable the creation of the statefulSet.
      create: true

      # -- Name of the statefulSet to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the statefulSet in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the statefulSet in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- (int) Number of seconds to wait before a pod is considered available, if no containers are crashing.
      # Omitted, if nil or empty.
      minReadySeconds: ~

      # -- Policy to manage the lifecycle of PVCs created from "volumeClaimTemplates".
      # See https://kubernetes.io/docs/reference/generated/kubernetes-api/latest/#statefulsetpersistentvolumeclaimretentionpolicy-v1-apps for which values can be used.
      # Omitted, if empty or nil.
      persistentVolumeClaimRetentionPolicy: {}

      # -- Policy to control how pods are created during initial scale up, when replacing pods on nodes, or when scaling down.
      # Can be "OrderedReady" or "Parallel".
      podManagementPolicy: OrderedReady

      # -- (int) Number of desired pods to create. Omitted, if nil or empty.
      replicas: ~

      # -- (int) Maximum number of revisions to keep in the statefulSet's revision history to perform rollbacks.
      # Omitted, if nil or empty.
      revisionHistoryLimit: ~

      # -- Name of the service that governs this StatefulSet.
      # Defaults to the name of the statefulSet, if nil or empty.
      serviceName: ~

      # -- The statefulSet updateStrategy to use to replace existing pods with new ones. Omitted, if nil or empty.
      updateStrategy: {}

      # -- A list of storage claims that are created and attached to the statefulSet automatically.
      # Useful to dynamically provision PVCs that are mapped to each pod controlled by the statefulSet.
      # It takes precedence over volumes defined in the PodTemplate, if a volume and volumeClaimTemplate have the same name.
      #
      # Should be used with caution because volumes managed by a volumeClaimTemplate cannot be resized dynamically after their creation.
      # Values go through tpl. Omitted, if empty or nil.
      volumeClaimTemplates: []

      # -- Values to configure the pods managed by the statefulSet.
      # You can use all fields described in the [Pod](#pod) section of the README here.
      pods: {}

    cronJob:
      # -- Toggle to enable/disable the creation of the cronJob.
      create: true

      # -- Name of the cronJob to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the cronJob in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the cronJob in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- Specifies how to treat concurrent executions of a Job. Omitted, if nil or empty.
      concurrencyPolicy: Forbid

      # -- Number of failed finished jobs to retain. Omitted, if nil or empty.
      failedJobsHistoryLimit: 1

      # -- Schedule to launch jobs in Cron format, see https://en.wikipedia.org/wiki/Cron.
      # Templating fails, if nil or empty.
      schedule: "@daily"

      # -- (int) Deadline in seconds for starting the job if it misses scheduled time for any reason. Missed jobs executions will be counted as failed ones.
      # Omitted, if nil or empty.
      startingDeadlineSeconds: ~

      # -- Number of successful finished jobs to retain. Omitted, if nil or empty.
      successfulJobsHistoryLimit: 1

      # -- Toggle to suspend subsequent executions. Omitted, if not true.
      suspend: false

      # -- Name of the time zone for the given schedule. See https://en.wikipedia.org/wiki/List_of_tz_database_time_zones.
      # Defaults to the time zone of the kube-controller-manager process. Omitted, if nil or empty.
      timeZone: Europe/Berlin

      # -- Values to configure the job managed by the cronJob.
      # You can use all fields described in the [Job](#job) section of the README here.
      jobs: {}

    service:
      # -- Toggle to enable/disable the creation of a service.
      create: true

      # -- Name of the service to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the service in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the service in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- Type of the service to create.
      type: ClusterIP

      # -- Session affinity to control how requests are routed. Can be "ClientIP" or "None".
      # Omitted if nil or empty.
      sessionAffinity: ClientIP

      # -- Session affinity configs to be set in addition to "sessionAffinity".
      # Omitted if nil or empty.
      sessionAffinityConfig: ~

      # -- Ports for the service. Follows the "list-from-dict" input schema.
      # See [List from dict](#list-from-dict) in README for more.
      ports: {}

    ingress:
      # -- Toggle to enable/disable the creation of the ingress.
      create: true

      # -- Name of the ingress to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the ingress in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the ingress in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- Backend that should handle any requests that don't match a rule.
      # If "rules" are nil or empty, "defaultBackend" must be set.
      # Omitted, if "rules" are set and this is nil or empty.
      defaultBackend: ""

      # -- Name of the ingressClass to use. Omitted, if nil or empty.
      className: ""

      # -- List of rules for the ingress. Values go through tpl.
      # See https://kubernetes.io/docs/reference/generated/kubernetes-api/latest/#ingressrule-v1-networking-k8s-io for more.
      rules: []
      
      # -- List of TLS hosts to serve. Values go through tpl. Omitted, if nil or empty.
      # See https://kubernetes.io/docs/reference/generated/kubernetes-api/latest/#ingresstls-v1-networking-k8s-io for more.
      tls: []

    serviceAccount:
      # -- Toggle to enable/disable the creation of the serviceAccount.
      create: true

      # -- Name of the serviceAccount to create. Values goes through tpl. Will be computed, if nil or empty.
      # Templating fails if "create=true" and "name=default".
      name: ""

      # -- Labels to add to the serviceAccount in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the serviceAccount in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- Toggle to enable/disable the automatic mount of the serviceAccount token. Omitted, if not true.
      automountToken: false

    role:
      # -- Toggle to enable/disable the creation of the role.
      create: true

      # -- Name of the role to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Overrides the namespace to create the role in. It will be created in the release namespace, if empty or nil.
      namespaceOverride: ""

      # -- Labels to add to the role in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the role in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- List of RBAC rules for the role. Values go through tpl.
      rules: []

    roleBinding:
      # -- Toggle to enable/disable the creation of the roleBinding.
      create: true

      # -- Name of the roleBinding to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Overrides the namespace to create the roleBinding in. It will be created in the release namespace, if empty or nil.
      namespaceOverride: ""

      # -- Labels to add to the roleBinding in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the roleBinding in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      subject:
        # -- Kind of the subject to attach the roleBinding to.
        kind: ServiceAccount

        # -- Name of the subject to attach the roleBinding to. Will be computed, if nil or empty.
        subject: ""

        # Namespace of the subject to attach the roleBinding to. Will be the release namespace, if nil or empty.
        namespace: ""

      roleRef:
        # -- apiGroup of the referenced role.
        apiGroup: rbac.authorization.k8s.io

        # -- kind of the referenced role.
        kind: Role

        # -- name of the referenced role. Will be computed, if nil or empty.
        name: ""

    configMap:
      # -- Toggle to enable/disable the creation of the configMap.
      create: true

      # -- Name of the configMap to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the configMap in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the configMap in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- Data to store in the configMap. Values go through tpl.
      data: {}

    secret:
      # -- Toggle to enable/disable the creation of the secret.
      create: true

      # -- Name of the secret to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the secret in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the secret in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- Data to store in the secret. Note that all data has to be provided in clear text, not base64 encoded. Values go through tpl.
      # Note: If you want to keep sensitive data secure, use a backend (e.g. AWS Secrets Manager or HashiCorp Vault)
      # and retrieve secrets at runtime via External Secrets Operator instead of storing them in values files.
      stringData: {}

    persistentVolume:
      # -- Toggle to enable/disable the creation of the persistentVolume.
      create: true

      # -- Name of the persistentVolume to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the persistentVolume in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the persistentVolume in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- Configures the "spec" section of the persistentVolume. Values go through tpl.
      # See https://kubernetes.io/docs/reference/generated/kubernetes-api/latest/#persistentvolumespec-v1-core for more.
      spec: {}

    persistentVolumeClaim:
      # -- Toggle to enable/disable the creation of the persistentVolumeClaim.
      create: true

      # -- Name of the persistentVolumeClaim to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the persistentVolumeClaim in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the persistentVolumeClaim in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- Configures the "spec" section of the persistentVolumeClaim. Values go through tpl.
      # See https://kubernetes.io/docs/reference/generated/kubernetes-api/latest/#persistentvolumeclaimspec-v1-core for more.
      spec: {}

    podDisruptionBudget:
      # -- Toggle to enable/disable the creation of the podDisruptionBudget.
      create: true

      # -- Name of the podDisruptionBudget to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the podDisruptionBudget in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the podDisruptionBudget in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- Configures that an eviction is allowed, if at most "maxUnavailable" pods are unavailable after the eviction.
      maxUnavailable: 1

      # -- Configures that an eviction is allowed, if at least "minAvailable" pods will still be available after the eviction.
      # This only takes effect if "maxUnavailable" is nil or empty. If both "maxUnavailable" and "minAvailable" are nil or empty, templating fails.
      minAvailable: 1

      # -- Defines the criteria for when unhealthy pods should be considered for eviction.
      # Can be "AlwaysAllow" or "IfHealthyBudget". Omitted, if nil or empty.
      unhealthyPodEvictionPolicy: AlwaysAllow

    horizontalPodAutoscaler:
      # -- Toggle to enable/disable the creation of the horizontalPodAutoscaler.
      create: true

      # -- Name of the horizontalPodAutoscaler to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the horizontalPodAutoscaler in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the horizontalPodAutoscaler in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      scaleTargetRef:
        # -- API version of the referent.
        apiVersion: apps/v1

        # -- Kind of the referent.
        kind: Deployment

        # -- Name of the referent. Will be compted, if nil or empty.
        name: ""

      # -- The lower limit number of pods to which the target can be scaled down to.
      minReplicas: 1

      # -- The upper limit number of pods that can be scaled up to. Cannot be smaller than "minReplicas".
      maxReplicas: 3

      # -- Configures the scaling behavior of the target in both directions (scale up and down). Omitted, if nil or empty.
      # See https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.35/#horizontalpodautoscalerbehavior-v2-autoscaling for more.
      behavior: {}

      # -- The target average CPU utilization percentage across all pods. Omitted if nil or empty.
      targetCPUUtilizationPercentage: 70

      # -- The target average memory utilization percentage across all pods. Omitted if nil or empty.
      # If both "targetCPUUtilizationPercentage" and "targetMemoryUtilizationPercentage" are nil/empty, templating fails.
      targetMemoryUtilizationPercentage: ~

    certificate:
      # -- Toggle to enable/disable the creation of the certificate resource. Deployment fails, if corresponding
      # custom resource definitions served by cert-manager are not installed in your cluster (https://cert-manager.io).
      create: true

      # -- Name of the certificate to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the certficate in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the certficate in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      secret:
        # -- Name of the corresponding secret to create. Will be computed, if nil or empty.
        name: ""

        # -- Labels to add to the corresponding secret in addition to "commonLabels". Values go through tpl.
        labels: {}

        # -- Annotations to add to the corresponding secret in addition to "commonLabels". Values go through tpl.
        annotations: {}

      # -- Requested common name X509 certificate subject attribute. Values go through tpl. Omitted, if nil or empty.
      commonName: "{{ .Release.Name }}"

      # -- Requested lifetime of the certificate. Omitted, if nil or empty.
      duration: 720h0m0s

      # -- Configures how long before the currently issued certificate’s expiry cert-manager should renew the certificate. Omitted, if nil or empty.
      renewBefore: ""

      # -- "renewBeforePercentage" is like "renewBefore", except it is a relative percentage rather than an absolute duration.
      # Omitted, if nil/empty or "renewBefore" is already set.
      renewBeforePercentage: 25

      # -- List of requested DNS subject alternative names. Values go through tpl. Omitted, if nil or empty.
      dnsNames:
        - "{{ .Release.Name }}"
        - "{{ .Release.Name }}.{{ .Release.Namespace }}"
        - "{{ .Release.Name }}.{{ .Release.Namespace }}.svc.cluster.local"

      keystores:
        jks:
          # -- Toggle to enable/disable the creation of a secret containing a JKS keystore.
          create: false

          # -- Name of the secret containing the key to encrypt the keystore with. Values go through tpl.
          secretName: "{{ .Release.Name }}-jks"

        pkcs12:
          # -- Toggle to enable/disable the creation of a secret containing a pkcs12 keystore.
          create: false

          # -- Name of the secret containing the key to encrypt the keystore with. Values go through tpl.
          secretName: "{{ .Release.Name }}-pkcs12"

      issuerRef:
        # -- API group of the issuer to use.
        group: cert-manager.io

        # -- Name of the (cluster)issuer to use.
        name: ca-issuer

        # -- Kind of issuer to use.
        kind: ClusterIssuer

      # -- Requested basic constraints isCA value. The isCA value is used to set the isCA field on the created CertificateRequest resources.
      # Omitted, if not true.
      isCA: false

      # -- Requested key usages and extended key usages. These usages are used to set the usages field on the created CertificateRequest resources.
      # Omitted, if nil or empty.
      usages: []

      # -- Spec for how to create the the private key. See https://cert-manager.io/docs/reference/api-docs/#cert-manager.io/v1.CertificatePrivateKey for more.
      privateKey:
        algorithm: RSA
        encoding: PKCS1
        size: 2048

      # -- The maximum number of CertificateRequest revisions that are maintained in the certificate’s history.
      # Omitted, if nil or empty.
      revisionHistoryLimit: 3

      # -- x.509 certificate NameConstraint extension which MUST NOT be used in a non-CA certificate (isCA=false).
      # See https://cert-manager.io/docs/reference/api-docs/#cert-manager.io/v1.NameConstraints for more.
      nameConstraints: {}

    podMonitor:
      # -- Toggle to enable/disable the podMonitor resource. Deployment fails, if corresponding
      # custom resource definitions served by the prometheus-operator are not installed in your cluster
      # (https://prometheus-operator.dev/).
      create: true

      # -- Name of the podMonitor to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Namespace to create the podMonitor resource in. If nil or empty, "{{ .Release.Namespace }}" is used.
      namespaceOverride: ""

      # -- Labels to add to the podMonitor in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the podMonitor in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- List of endpoints where metrics are served from so they can be scraped by prometheus. Values go through tpl.
      # See https://prometheus-operator.dev/docs/api-reference/api/#monitoring.coreos.com/v1.PodMetricsEndpoint for all available options.
      podMetricsEndpoints: []

    externalSecret:
      # -- Toggle to enable/disable the creation of the externalsecret resource. Deployment fails, if corresponding
      # custom resource definitions served by external-secrets operator are not installed in your cluster (https://external-secrets.io).
      create: true

      # -- Name of the externalSecret to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Labels to add to the externalsecret in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the externalsecret in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      secret:
        # -- Name of the corresponding secret to create. Will be computed, if nil or empty.
        name: ""

        # -- Type of the corresponding secret to create. Omitted, if nil or empty.
        type: ""

        # -- Labels to add to the corresponding secret in addition to "commonLabels". Values go through tpl.
        labels: {}

        # -- Annotations to add to the corresponding secret in addition to "commonLabels". Values go through tpl.
        annotations: {}

        # -- Defines how to create the corresponding secret. Omitted, if empty or nil.
        creationPolicy: ""

        # -- Defines how to delete the corresponding secret. Omitted, if empty or nil.
        deletionPolicy: ""

      # -- Determines how the externalsecret should be refreshed. Omitted, if nil or empty.
      refreshPolicy: OnChange

      # -- The amount of time before the values are read again from the SecretStore provider, specified as Golang duration string.
      refreshInterval: 24h0m0s

      secretStoreRef:
        # -- Name of the SecretStore to use.
        name: aws

        # -- Kind of the SecretStore to use.
        kind: ClusterSecretStore

      # -- Base path is prepended to the key of every remoteRef data item, if set.
      basePath: ""

      # --  Default decoding strategy to use for every remoteRef data item.
      decodingStrategy: Auto

      # --  Default conversion strategy to use every remoteRef data item.
      conversionStrategy: Default

      # --  Default metadata policy to use every remoteRef data item.
      metadataPolicy: Fetch

      # -- List of items that describe what data are fetched from a SecretStore and how to store it in a kubernetes secret.
      # See https://external-secrets.io/latest/api/spec/#external-secrets.io/v1.ExternalSecretData for more.
      data: []

    kafkaUser:
      # -- Toggle to enable/disable the creation of the kafkauser resource. Deployment fails, if corresponding
      # custom resource definitions served by strimzi-kafka-operator are not installed in your cluster (https://strimzi.io).
      create: true

      # -- Name of the kafkaUser to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Namespace to create the kafkauser resource in. If nil or empty, "{{ .Release.Namespace }}" is used.
      namespaceOverride: ""

      # -- Labels to add to the kafkauser in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the kafkauser in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      secret:
        # -- Labels to add to the corresponding secret in addition to "commonLabels". Values go through tpl.
        labels: {}

        # -- Annotations to add to the corresponding secret in addition to "commonLabels". Values go through tpl.
        annotations: {}

      # -- Authentication mechanism to enable for the kafkauser. Supported authentication mechanisms are "scram-sha-512", "tls", and "tls-external".
      # See https://strimzi.io/docs/operators/latest/configuring.html#type-KafkaUser-reference for more.
      authentication:
        type: scram-sha-512

      # -- Authorization rules for the kafkauser. Values go through tpl.
      # See https://strimzi.io/docs/operators/latest/configuring.html#type-KafkaUserAuthorizationSimple-reference for more.
      authorization:
        type: simple
        acls: []

      # -- Request quotas to limit kafka broker resource usage caused by the kafkauser.
      # Omitted, if nil or empty.
      quotas: {}

    kafkaTopic:
      # -- Toggle to enable/disable the creation of the kafkatopic resource. Deployment fails, if corresponding
      # custom resource definitions served by strimzi-kafka-operator are not installed in your cluster (https://strimzi.io).
      create: true

      # -- Name of the kafkaUser to create. Values go through tpl. Will be computed, if nil or empty.
      name: ""

      # -- Namespace to create the kafkatopic resource in. If nil or empty, "{{ .Release.Namespace }}" is used.
      namespaceOverride: ""

      # -- Labels to add to the kafkatopic in addition to "commonLabels". Values go through tpl.
      labels: {}

      # -- Annotations to add to the kafkatopic in addition to "commonAnnotations". Values go through tpl.
      annotations: {}

      # -- (int) Number of partitions the topic should have. This cannot be decreased after topic creation.
      # When absent, this will default to the broker configuration for "num.partitions". Omitted, if nil or empty.
      partitions: ~

      # -- (int) Number of replicas the topic should have across brokers. Defaults to the broker configuration for "default.replication.factor", if unset.
      # Omitted, if nil or empty.
      replicas: ~

      # -- Config for the topic. See https://kafka.apache.org/42/configuration/topic-configs/ for more.
      # Omitted, if nil or empty.
      config: {}

    # -- List of kubernetes manifests to install. Values go through tpl.
    # See [Extra manifests](#extra-manifests) in README for more.
    extraManifests: []
