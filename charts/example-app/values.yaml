---
replicas: 3
revisionHistoryLimit: 5
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 1

pods:
  annotations:
    # This causes pods to get rolled on a config change automatically
    config/checksum: "{{ .Values.configMap.data | toYaml | sha256sum }}"

  volumes:
    spring-config:
      configMap:
        name: "{{ .Release.Name }}"

  containers:
    app:
      resources: medium
      image:
        repository: ghcr.io/example/spring-boot-app

      env:
        KAFKA_USERNAME:
          valueFrom:
            secretKeyRef:
              name: "{{ .Release.Name }}-ku"
              key: username

        KAFKA_PASSWORD:
          valueFrom:
            secretKeyRef:
              name: "{{ .Release.Name }}-ku"
              key: password

      ports:
        http:
          containerPort: 8080

      startupProbe:
        periodSeconds: 10
        failureThreshold: 18
        httpGet:
          path: /actuator/health/liveness
          port: 8080

      readinessProbe:
        periodSeconds: 10
        initialDelaySeconds: 10
        httpGet:
          path: /actuator/health/readiness
          port: 8080

      livenessProbe:
        periodSeconds: 10
        failureThreshold: 3
        httpGet:
          path: /actuator/health/liveness
          port: 8080

      volumeMounts:
        spring-config:
          mountPath: /config
          readOnly: true

configMap:
  name: "{{ .Release.Name }}"
  data:
    application.yaml: |
      server:
        port: 8080

      management:
        endpoints:
          web:
            exposure:
              include: health,info,prometheus

        endpoint:
          health:
            probes:
              enabled: true

service:
  name: "{{ .Release.Name }}"
  sessionAffinity: None
  ports:
    http:
      port: 80
      targetPort: http

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt

  rules:
    - host: chc-lib.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: "{{ .Release.Name }}"
                port:
                  name: http

  hosts:
    - host: chc-lib.example.com
      paths:
        - path: /
          pathType: Prefix
          servicePort: http

  tls:
    - secretName: "{{ .Release.Name }}-tls"
      hosts:
        - chc-lib.example.com

podMonitor:
  podMetricsEndpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s

kafkaUser:
  secret:
    name: "{{ .Release.Name }}-ku"

  labels: &strimziLabels
    strimzi.io/cluster: test

  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: topic-one
          patternType: literal
        operation: Read

      - resource:
          type: topic
          name: topic-two
          patternType: literal
        operation: Write

kafkaTopics:
  topic-one:
    labels: *strimziLabels
    partitions: 1
    replicas: 3
    config:
      retention.ms: 259200000

  topic-two:
    labels: *strimziLabels
    partitions: 3
    replicas: 3
    config:
      retention.ms: 604800000
